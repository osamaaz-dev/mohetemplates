<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>دمج الصور مع القالب الرسمي</title>
<!-- ربط ملف الأنماط الخارجي (style.css) -->
<link rel="stylesheet" href="style.css">
<style>
  /* تحسين حجم المعاينة وجعلها أكبر */
  .editor-card {
    background: rgba(255, 255, 255, 0.95);
    /* border-radius: 24px; */
    margin: 24px 0;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }
  .editor-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 30px;
    align-items: start;
  }
  @media (max-width: 780px) {
    .editor-row {
      grid-template-columns: 1fr;
      gap: 20px;
    }
  }
  .preview-area {
    display: flex;
    justify-content: center;
    transition: all 0.25s ease;
    background: #f0ede5;
    /* border-radius: 24px; */
    padding: 16px;
  }
  .preview-canvas {
    /* border-radius: 20px; */
    border: 3px solid #b8a678;
    background: #1e2a2a;
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    width: 100%;
    height: auto;
    max-width: 480px;  /* حجم أكبر بكثير */
    transition: transform 0.2s ease;
  }
  /* تكبير المعاينة عند فتح الخيارات المتقدمة */
  .preview-large .preview-canvas {
    transform: scale(1.5);
    max-width: 520px;
  }
  .controls-area {
    background: #fefaf2;
    /* border-radius: 28px; */
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 260px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .control-group {
    background: #fff6ea;
    padding: 12px 16px;
    /* border-radius: 48px; */
  }
  .control-group label {
    font-weight: bold;
    font-size: 15px;
    color: #094239;
    display: block;
    margin-bottom: 8px;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #094239;
    height: 5px;
  }
  .warning-red {
    color: #c0392b;
    background: #ffe6e6;
    border-right: 5px solid #c0392b;
    padding: 10px 14px;
    /* border-radius: 16px; */
    font-size: 13px;
    font-weight: bold;
    margin-top: 12px;
  }
  .advanced-panel {
    background: #f0ede5;
    /* border-radius: 24px; */
    padding: 14px;
    margin-top: 14px;
    display: none;
  }
  .advanced-panel.show {
    display: block;
  }
  .toggle-adv-btn {
    background: #b8a678;
    color: white;
    border: none;
    /* border-radius: 60px; */
    padding: 8px 20px;
    font-size: 15px;
    cursor: pointer;
    width: auto;
    height: auto;
    margin: 6px 0;
    font-weight: bold;
  }
  .telegram-delete-btn-group button {
    background: #b3422d;
    width: auto;
    padding: 8px 18px;
    font-size: 14px;
    margin: 6px;
    /* border-radius: 40px; */
  }
  #downloads a {
    background: #e9e2d3;
    padding: 8px 20px;
    /* border-radius: 40px; */
    margin: 8px;
    display: inline-block;
    font-size: 16px;
  }
  /* تحسين شريط التقدم */
  .progress-wrapper {
    width: 100%;
    background: #ddd5c0;
    margin-top: 24px;
    /* border-radius: 60px; */
    height: 24px;
    overflow: hidden;
  }
  #progressBar {
    width: 0%;
    height: 100%;
    background: #094239;
    /* border-radius: 60px; */
    transition: width 0.25s;
  }
  /* جعل الصفحة تستوعب محتوى أكبر */
  .app {
    max-width: 1100px;
    width: 95%;
  }
</style>
</head>
<body>

<main class="app">
  <h2>دمج الصور مع القالب الرسمي</h2>
  <p class="subtitle">ارفع الصور (حتى 10 صور)</p>
  <p class="subtitle" style="color:#9e5e2e;">عند عدم تطابق أبعاد الصورة مع القالب، يظهر تحذير أحمر ويتم التكبير التلقائي بتناسب ثابت (uniform scale)</p>
  
  <input type="file" id="upload" accept="image/*" multiple>
  <br>
  <button id="processBtn">معالجة وتحميل الصور</button>
  <button onclick="sendToTelegram()" style="background:#0088cc;">إرسال إلى تلغرام</button>
  <br>
  <button onclick="refreshDeleteButtons()" style="background:#e6e4e1; scale: 40%;">إعادة ضبط أزرار الحذف</button>
  
  <div id="downloads"></div>
  <div class="progress-wrapper">
    <div id="progressBar"></div>
  </div>
  
  <div id="advancedSettings" style="margin-top:20px;"></div>
</main>

<script>
// ---------------------- المتغيرات العامة ----------------------
const overlaySrc = "overlay.png";
let messageIds = JSON.parse(localStorage.getItem("msg_ids") || "[]");

// ---------- دوال مساعدة ----------
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = () => reject(new Error("file_read_error"));
    reader.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("image_load_error"));
    img.src = src;
  });
}

function dataURLToBlob(dataURL) {
  const byteString = atob(dataURL.split(',')[1]);
  const mimeString = dataURL.split(',')[0].split(':')[1].split(';')[0];
  const ab = new ArrayBuffer(byteString.length);
  const ia = new Uint8Array(ab);
  for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
  return new Blob([ab], { type: mimeString });
}

// دالة الرسم النهائية: تحافظ على النسبة الأصلية للصورة (Uniform Scale) ولا تغير أبعاد القالب
function drawMergedImage(baseImage, overlay, index = -1) {
  const canvas = document.createElement("canvas");
  canvas.width = overlay.width;
  canvas.height = overlay.height;
  const ctx = canvas.getContext("2d");
  
  let zoom = 1, offsetX = 0, offsetY = 0;
  let brightness = 1, contrast = 1, saturation = 1;
  
  if (index >= 0) {
    const scaleEl = document.getElementById(`scale_${index}`);
    const xEl = document.getElementById(`x_${index}`);
    const yEl = document.getElementById(`y_${index}`);
    const brightEl = document.getElementById(`brightness_${index}`);
    const contrastEl = document.getElementById(`contrast_${index}`);
    const satEl = document.getElementById(`saturation_${index}`);
    
    if (scaleEl) zoom = parseFloat(scaleEl.value);
    if (xEl) offsetX = parseInt(xEl.value);
    if (yEl) offsetY = parseInt(yEl.value);
    if (brightEl) brightness = parseFloat(brightEl.value);
    if (contrastEl) contrast = parseFloat(contrastEl.value);
    if (satEl) saturation = parseFloat(satEl.value);
  }
  
  // الحفاظ على النسبة الأصلية للصورة (uniform scale)
  const imgW = baseImage.width;
  const imgH = baseImage.height;
  const drawWidth = imgW * zoom;
  const drawHeight = imgH * zoom;
  
  // توسيط الصورة + الإزاحات
  const centerX = (canvas.width - drawWidth) / 2 + offsetX;
  const centerY = (canvas.height - drawHeight) / 2 + offsetY;
  
  ctx.filter = `brightness(${brightness}) contrast(${contrast}) saturate(${saturation})`;
  ctx.drawImage(baseImage, centerX, centerY, drawWidth, drawHeight);
  
  ctx.filter = "none";
  ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);
  
  return canvas.toDataURL("image/jpeg", 0.92);
}

// إنشاء واجهة التحرير لكل صورة (معاينة كبيرة، أدوات يمين)
async function generateControls() {
  const files = document.getElementById("upload").files;
  const container = document.getElementById("advancedSettings");
  container.innerHTML = "";
  
  if (files.length === 0) return;
  
  let overlayImg;
  try {
    overlayImg = await loadImage(overlaySrc);
  } catch(e) {
    alert("خطأ: القالب (overlay.png) غير موجود. يرجى وضعه في نفس المجلد.");
    return;
  }
  
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const baseSrc = await readFileAsDataURL(file);
    const baseImage = await loadImage(baseSrc);
    
    // حساب نسبة أبعاد القالب مقابل الصورة
    const overlayRatio = overlayImg.width / overlayImg.height;
    const imageRatio = baseImage.width / baseImage.height;
    const ratioMismatch = Math.abs(overlayRatio - imageRatio) > 0.02;
    
    // تكبير تلقائي لتغطية القالب مع الحفاظ على النسبة
    const scaleToCoverX = overlayImg.width / baseImage.width;
    const scaleToCoverY = overlayImg.height / baseImage.height;
    const autoScale = Math.max(scaleToCoverX, scaleToCoverY);
    
    let warningMsg = "";
    if (ratioMismatch) {
      warningMsg = "تنبيه: أبعاد الصورة لا تتطابق مع نسبة القالب. تم ضبط التكبير التلقائي لتغطية الإطار مع الحفاظ على النسبة الأصلية. يمكنك تعديل التكبير أو التحريك يدوياً.";
    }
    
    const cardDiv = document.createElement("div");
    cardDiv.className = "editor-card";
    cardDiv.setAttribute("data-index", i);
    
    // تحديد أبعاد معاينة مناسبة (نسبة القالب لكن بحجم عرض 100% وارتفاع تلقائي)
    // نعطي قيمة عرض وارتفاع للـ canvas بناءً على حجم القالب الأصلي ولكن ستظهر بشكل مرن بفضل CSS
    cardDiv.innerHTML = `
      <h4 style="margin:0 0 16px 0; color:#094239; font-size:1.4rem;">الصورة ${i+1} — ${file.name.substring(0, 40)}</h4>
      <div class="editor-row">
        <div class="preview-area" id="previewArea_${i}">
          <canvas id="preview_${i}" width="${overlayImg.width}" height="${overlayImg.height}" class="preview-canvas" style="max-width:100%; height:auto; width:auto;"></canvas>
        </div>
        <div class="controls-area">
          <div class="control-group">
            <label>🔍 تكبير / تصغير </label>
            <input type="range" min="0.3" max="2.5" step="0.01" value="${autoScale}" id="scale_${i}">
          </div>
          <div class="control-group">
            <label>⬅️ تحريك أفقي (X)</label>
            <input type="range" min="-300" max="300" value="0" step="2" id="x_${i}">
          </div>
          <div class="control-group">
            <label>⬆️ تحريك عمودي (Y)</label>
            <input type="range" min="-300" max="300" value="0" step="2" id="y_${i}">
          </div>
          <button type="button" class="toggle-adv-btn" data-target="adv_${i}">خيارات متقدمة (إضاءة، ألوان)</button>
          <div id="adv_${i}" class="advanced-panel">
            <div class="control-group">
              <label>💡 السطوع (Brightness)</label>
              <input type="range" min="0.2" max="2.2" step="0.01" value="1" id="brightness_${i}">
            </div>
            <div class="control-group">
              <label>🎨 التباين (Contrast)</label>
              <input type="range" min="0.3" max="2.5" step="0.01" value="1" id="contrast_${i}">
            </div>
            <div class="control-group">
              <label>🌈 التشبع (Saturation)</label>
              <input type="range" min="0" max="2.2" step="0.01" value="1" id="saturation_${i}">
            </div>
          </div>
          ${ratioMismatch ? `<div class="warning-red" id="warn_${i}">⚠️ ${warningMsg}</div>` : `<div id="warn_${i}" style="display:none;"></div>`}
        </div>
      </div>
    `;
    container.appendChild(cardDiv);
    
    // ربط زر الخيارات المتقدمة و تكبير المعاينة
    const toggleBtn = cardDiv.querySelector(`.toggle-adv-btn`);
    const advPanel = document.getElementById(`adv_${i}`);
    const previewArea = document.getElementById(`previewArea_${i}`);
    
    toggleBtn.addEventListener("click", () => {
      advPanel.classList.toggle("show");
      if (advPanel.classList.contains("show")) {
        previewArea.classList.add("preview-large");
      } else {
        previewArea.classList.remove("preview-large");
      }
    });
    
    // إعداد المعاينة المباشرة
    await setupAdvancedPreview(i, baseImage, overlayImg);
  }
}

async function setupAdvancedPreview(index, baseImage, overlayImg) {
  const canvas = document.getElementById(`preview_${index}`);
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = overlayImg.width;
  canvas.height = overlayImg.height;
  
  function updatePreview() {
    const zoom = parseFloat(document.getElementById(`scale_${index}`)?.value || 1);
    const offsetX = parseInt(document.getElementById(`x_${index}`)?.value || 0);
    const offsetY = parseInt(document.getElementById(`y_${index}`)?.value || 0);
    const brightness = parseFloat(document.getElementById(`brightness_${index}`)?.value || 1);
    const contrast = parseFloat(document.getElementById(`contrast_${index}`)?.value || 1);
    const saturation = parseFloat(document.getElementById(`saturation_${index}`)?.value || 1);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const imgW = baseImage.width;
    const imgH = baseImage.height;
    const drawWidth = imgW * zoom;
    const drawHeight = imgH * zoom;
    const centerX = (canvas.width - drawWidth) / 2 + offsetX;
    const centerY = (canvas.height - drawHeight) / 2 + offsetY;
    
    ctx.filter = `brightness(${brightness}) contrast(${contrast}) saturate(${saturation})`;
    ctx.drawImage(baseImage, centerX, centerY, drawWidth, drawHeight);
    ctx.filter = "none";
    ctx.drawImage(overlayImg, 0, 0, canvas.width, canvas.height);
  }
  
  const ids = [`scale_${index}`, `x_${index}`, `y_${index}`, `brightness_${index}`, `contrast_${index}`, `saturation_${index}`];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", () => updatePreview());
  });
  updatePreview();
}

// معالجة جميع الصور وتحميلها
async function processImages() {
  const files = document.getElementById("upload").files;
  const downloadsDiv = document.getElementById("downloads");
  downloadsDiv.innerHTML = "";
  
  if (files.length === 0) {
    alert("اختر صوراً أولاً");
    return;
  }
  if (files.length > 10) {
    alert("الحد الأقصى 10 صور");
    return;
  }
  
  let overlay;
  try {
    overlay = await loadImage(overlaySrc);
  } catch(e) {
    alert("القالب (overlay.png) غير موجود، تأكد من وجوده");
    return;
  }
  
  for (let i = 0; i < files.length; i++) {
    try {
      const baseSrc = await readFileAsDataURL(files[i]);
      const baseImage = await loadImage(baseSrc);
      const resultURL = drawMergedImage(baseImage, overlay, i);
      const fileName = `merged_${i+1}.png`;
      const link = document.createElement("a");
      link.href = resultURL;
      link.download = fileName;
      link.textContent = `📥 تحميل الصورة المعالجة ${i+1}`;
      downloadsDiv.appendChild(link);
      downloadsDiv.appendChild(document.createElement("br"));
      setTimeout(() => link.click(), i * 150);
    } catch(err) {
      const errMsg = document.createElement("p");
      errMsg.textContent = `❌ فشل معالجة الصورة ${i+1}: ${err.message}`;
      downloadsDiv.appendChild(errMsg);
    }
  }
}

// إرسال إلى تلغرام
async function sendToTelegram() {
  const files = document.getElementById("upload").files;
  if (files.length === 0) {
    alert("اختر صوراً أولاً");
    return;
  }
  
  const BOT_TOKEN = "8320697814:AAGq5UTVDyzTWnL1FmiKHomrgKst7ddVsFM";
  const CHAT_ID = "-1003557221315";
  
  let overlay;
  try {
    overlay = await loadImage(overlaySrc);
  } catch(e) {
    alert("تعذر تحميل القالب (overlay.png)");
    return;
  }
  
  const progressBar = document.getElementById("progressBar");
  progressBar.style.width = "0%";
  
  for (let i = 0; i < files.length; i++) {
    try {
      const baseSrc = await readFileAsDataURL(files[i]);
      const baseImage = await loadImage(baseSrc);
      const resultURL = drawMergedImage(baseImage, overlay, i);
      const blob = dataURLToBlob(resultURL);
      const formData = new FormData();
      formData.append("chat_id", CHAT_ID);
      formData.append("photo", blob, `design_${i+1}.png`);
      formData.append("caption", `الصورة رقم ${i+1} بعد التعديلات (سطوع، تباين، تشبع، تكبير/تحريك)`);
      
      const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: "POST",
        body: formData
      });
      const resData = await response.json();
      if (response.ok && resData.ok) {
        const msgId = resData.result.message_id;
        messageIds.push(msgId);
        localStorage.setItem("msg_ids", JSON.stringify(messageIds));
        renderDeleteButtons();
      } else {
        throw new Error(resData.description || "فشل الإرسال");
      }
      const percent = Math.round(((i+1) / files.length) * 100);
      progressBar.style.width = percent + "%";
    } catch (error) {
      console.error(error);
      alert(`خطأ في الصورة ${i+1}: ${error.message}`);
    }
  }
  alert("✅ اكتملت عملية الإرسال إلى تلغرام");
  progressBar.style.width = "100%";
  setTimeout(() => progressBar.style.width = "0%", 2000);
}

// إدارة أزرار الحذف
function renderDeleteButtons() {
  const container = document.getElementById("downloads");
  const existing = container.querySelector(".telegram-delete-btn-group");
  if (existing) existing.remove();
  
  if (messageIds.length === 0) return;
  
  const deleteSection = document.createElement("div");
  deleteSection.className = "telegram-delete-btn-group";
  deleteSection.style.marginTop = "20px";
  deleteSection.style.borderTop = "1px dashed #b8a678";
  deleteSection.style.paddingTop = "15px";
  deleteSection.innerHTML = `<h5 style="margin:10px 0;">🗑️ إدارة الرسائل المرسلة في تلغرام</h5>`;
  
  messageIds.forEach((id, idx) => {
    const btn = document.createElement("button");
    btn.textContent = `حذف الصورة رقم ${idx+1}`;
    btn.style.background = "#b3422d";
    btn.style.width = "auto";
    btn.style.margin = "5px";
    btn.onclick = () => deleteMessageById(id, idx);
    deleteSection.appendChild(btn);
  });
  container.appendChild(deleteSection);
}

async function deleteMessageById(messageId, index) {
  const BOT_TOKEN = "8320697814:AAGq5UTVDyzTWnL1FmiKHomrgKst7ddVsFM";
  const CHAT_ID = "-1003557221315";
  try {
    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: CHAT_ID, message_id: messageId })
    });
    const result = await response.json();
    if (result.ok) {
      alert(`تم حذف الرسالة ${messageId}`);
      messageIds.splice(index, 1);
      localStorage.setItem("msg_ids", JSON.stringify(messageIds));
      renderDeleteButtons();
    } else {
      alert(`فشل الحذف: ${result.description}`);
    }
  } catch(err) {
    alert("خطأ في الاتصال أثناء محاولة الحذف");
  }
}

function refreshDeleteButtons() {
  const container = document.getElementById("downloads");
  const delGroup = container.querySelector(".telegram-delete-btn-group");
  if (delGroup) delGroup.remove();
  localStorage.removeItem("msg_ids");
  messageIds = [];
  renderDeleteButtons();
  alert("تم مسح أزرار الحذف والذاكرة المحلية");
}

// ربط الأحداث
document.getElementById("upload").addEventListener("change", () => {
  generateControls();
});
document.getElementById("processBtn").addEventListener("click", processImages);

window.onload = () => {
  renderDeleteButtons();
  if (document.getElementById("upload").files.length > 0) {
    generateControls();
  }
};
</script>
</body>
</html>
