<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دمج الصور مع قالب</title>
<style>
:root {
  --moh-green: #094239;
  --moh-gold: #b8a678;
  --moh-text: #3c3a3b;
  --panel-bg: rgba(255, 255, 255, 0.9);
}

@font-face {
  font-family: "QomraBlack";
  src: url("fonts/itfQomraArabic-Black.otf") format("opentype");
}

@font-face {
  font-family: "QomraRegular";
  src: url("fonts/itfQomraArabic-Regular.otf") format("opentype");
}

@font-face {
  font-family: "QomraLight";
  src: url("fonts/itfQomraArabic-Light.otf") format("opentype");
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  direction: rtl;
  text-align: center;
  color: var(--moh-text);
  background: #eeeadf url("images/BG.jpg") center/cover no-repeat fixed;
  font-family: "QomraRegular", Tahoma, Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.app {
  width: min(920px, 100%);
  background: var(--panel-bg);
  border: 2px solid var(--moh-green);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
  padding: 28px 24px;
}

h2 {
  margin: 0 0 20px;
  color: var(--moh-green);
  font-family: "QomraBlack", Tahoma, Arial, sans-serif;
  font-size: clamp(28px, 3vw, 40px);
}

.subtitle {
  margin: 0 0 20px;
  font-size: 18px;
}

input[type="file"] {
  width: min(100%, 500px);
  padding: 10px;
  border: 1px solid #c9c3b2;
  background: #fff;
  font-family: "QomraRegular", Tahoma, Arial, sans-serif;
}

button {
  background: var(--moh-gold);
  color: #fff;
  border: none;
  width: 190px;
  height: 50px;
  margin-top: 14px;
  font-size: 18px;
  cursor: pointer;
  font-family: "QomraLight", Tahoma, Arial, sans-serif;
  transition: transform 0.15s ease, filter 0.15s ease;
}

button:hover {
  filter: brightness(0.95);
  transform: translateY(-1px);
}

#downloads {
  margin-top: 24px;
  border-top: 1px solid #ddd5c0;
  padding-top: 18px;
}

#downloads a,
#downloads p {
  margin: 8px 0;
  font-size: 18px;
}

#downloads a {
  color: var(--moh-green);
  text-decoration: none;
}

#downloads a:hover {
  text-decoration: underline;
}

@media (max-width: 640px) {
  .app {
    padding: 22px 16px;
  }

  .subtitle {
    font-size: 16px;
  }

  button {
    width: 100%;
    max-width: 300px;
  }
}
.editor-row {
  display: flex;
  flex-direction: row-reverse; /* هذا هو المفتاح 🔥 */
  gap: 20px;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
}

.preview-canvas {
  border: 1px solid #999;
  max-width: 100%;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 200px;
}

.controls label {
  font-size: 14px;
}
</style>
</head>
<body>

<main class="app">
  <h2>دمج الصور مع القالب الرسمي</h2>
  <p class="subtitle">ارفع الصور (حتى 10 صور) ثم اضغط على زر المعالجة</p>
  <p class="subtitle" style="color: brown; font-size: 18px;">شرط أن تكون الأبعاد 3:2</p>
  <input type="file" id="upload" accept="image/*" multiple>
  <br>
  <button id="processBtn">معالجة وتحميل الصور</button>
  <button onclick="sendToTelegram()" style="background: #0088cc;">إرسال لتلغرام</button>
  <div id="downloads"></div>
  <div style="width:100%; background:#ddd; margin-top:20px; height:20px;">
    <div id="progressBar" style="width:0%; height:100%; background:#094239;"></div>
  </div>
  <!-- <button id="deleteBtn" style="background: #e74c3c; scale: 70%;">حذف آخر رسالة (تجربة)</button>   -->
  <div id="advancedSettings" style="margin-top:20px;"></div>
  <button onclick="refreshDeleteButtons()" style="background:#ccc8c8; scale: 30%;">
  تحديث / مسح الأزرار
  </button>
</main>


<script>
const overlaySrc = "overlay.png";

document.getElementById("processBtn").addEventListener("click", processImages);

async function processImages() {
  const files = document.getElementById("upload").files;
  const downloads = document.getElementById("downloads");
  downloads.innerHTML = "";

  if (!files || files.length === 0) {
    alert("اختر صورًا أولًا");
    return;
  }

  if (files.length > 10) {
    alert("الحد الأقصى هو 10 صور");
    return;
  }

  let overlay;
  try {
    overlay = await loadImage(overlaySrc);
  } catch (err) {
    alert("تعذر تحميل overlay.png. تأكد أنه موجود بجانب index.html خطأ برمجي");
    return;
  }

  for (let i = 0; i < files.length; i++) {
    try {
      const baseSrc = await readFileAsDataURL(files[i]);
      const baseImage = await loadImage(baseSrc);
      const resultURL = drawMergedImage(baseImage, overlay);

      const fileName = `image_${i + 1}.png`;
      const link = document.createElement("a");
      link.href = resultURL;
      link.download = fileName;
      link.textContent = `تنزيل ${fileName}`;
      downloads.appendChild(link);

      setTimeout(() => link.click(), i * 200);
    } catch (err) {
      const msg = document.createElement("p");
      msg.textContent = `حدث خطأ أثناء معالجة الصورة رقم ${i + 1}`;
      downloads.appendChild(msg);
    }
  }
}

// تعديل بسيط في دالة الرسم لضمان الحجم المثالي
function drawMergedImage(baseImage, overlay, index) {
    const canvas = document.createElement("canvas");

    const scaleControl = document.getElementById(`scale_${index}`);
    const xControl = document.getElementById(`x_${index}`);
    const yControl = document.getElementById(`y_${index}`);

    const scale = scaleControl ? parseFloat(scaleControl.value) : 1;
    const offsetX = xControl ? parseInt(xControl.value) : 0;
    const offsetY = yControl ? parseInt(yControl.value) : 0;

    canvas.width = baseImage.width;
    canvas.height = baseImage.height;

    const ctx = canvas.getContext("2d");

    const newWidth = baseImage.width * scale;
    const newHeight = baseImage.height * scale;

    const centerX = (canvas.width - newWidth) / 2 + offsetX;
    const centerY = (canvas.height - newHeight) / 2 + offsetY;

    ctx.drawImage(baseImage, centerX, centerY, newWidth, newHeight);
    ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);

    return canvas.toDataURL("image/jpeg", 0.9);
}
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = () => reject(new Error("file_read_error"));
    reader.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("image_load_error"));
    img.src = src;
  });
}

// دالة مساعدة لتحويل Base64 إلى Blob بشكل آمن
function dataURLToBlob(dataURL) {
    const byteString = atob(dataURL.split(',')[1]);
    const mimeString = dataURL.split(',')[0].split(':')[1].split(';')[0];
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
    }
    return new Blob([ab], { type: mimeString });
}

async function sendToTelegram() {
    const files = document.getElementById("upload").files;
    if (!files || files.length === 0) {
        alert("اختر صور أولاً");
        return;
    }

    const BOT_TOKEN = "8320697814:AAGq5UTVDyzTWnL1FmiKHomrgKst7ddVsFM";
    const CHAT_ID = "-1003557221315";

    let overlay;
    try {
        overlay = await loadImage(overlaySrc);
    } catch {
        alert("خطأ في تحميل القالب (overlay.png)");
        return;
    }

    const progressBar = document.getElementById("progressBar");
    progressBar.style.width = "0%";

    for (let i = 0; i < files.length; i++) {
        try {
            const baseSrc = await readFileAsDataURL(files[i]);
            const baseImage = await loadImage(baseSrc);
            const resultURL = drawMergedImage(baseImage, overlay, i);

            // تحويل الصورة المعالجة إلى Blob
            const blob = dataURLToBlob(resultURL);

            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("photo", blob, `design_${i + 1}.png`);
            formData.append("caption", `الصورة رقم  ${i + 1}`);

            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: "POST",
                body: formData
            });

            const resData = await response.json(); // هذا السطر ضروري جداً
            if (response.ok) {
            const msgId = resData.result.message_id;

            messageIds.push(msgId); // أضف الجديد
            localStorage.setItem("msg_ids", JSON.stringify(messageIds));

            renderDeleteButtons(); // تحديث الأزرار

            let percent = Math.round(((i + 1) / files.length) * 100);
            progressBar.style.width = percent + "%";
            }
             else {
                console.error("خطأ من تلغرام:", resData);
                throw new Error(resData.description);
            }

            let percent = Math.round(((i + 1) / files.length) * 100);
            progressBar.style.width = percent + "%";

        } catch (error) {
            console.error("خطأ في الصورة رقم " + (i + 1) + ":", error);
            alert("فشل إرسال الصورة رقم " + (i + 1) + "\nالسبب: " + error.message);
        }
    }
    alert("اكتملت العملية");
}

function renderDeleteButtons() {
    const container = document.getElementById("downloads");
    container.innerHTML = "";

    messageIds.forEach((id, index) => {
        const btn = document.createElement("button");
        btn.textContent = `حذف الصورة ${index + 1}`;
        btn.style.background = "#e74c3c";
        btn.style.margin = "5px";

        btn.onclick = () => deleteMessageById(id, index);

        container.appendChild(btn);
    });
}

async function deleteMessageById(messageId, index) {
    const BOT_TOKEN = "8320697814:AAGq5UTVDyzTWnL1FmiKHomrgKst7ddVsFM";
    const CHAT_ID = "-1003557221315";

    try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                message_id: messageId
            })
        });

        const result = await response.json();

        if (result.ok) {
            alert("تم حذف الصورة");

            // حذف من المصفوفة
            messageIds.splice(index, 1);
            localStorage.setItem("msg_ids", JSON.stringify(messageIds));

            renderDeleteButtons(); // تحديث العرض
        } else {
            alert(result.description);
        }
    } catch (err) {
        alert("خطأ في الاتصال");
    }
}
window.onload = () => {
    renderDeleteButtons();
};




// 1. تعريف المتغير في أعلى السكريبت ليكون متاحاً لكل الدالات
let messageIds = JSON.parse(localStorage.getItem("msg_ids") || "[]");

        } else {

// 3. ربط الدالة بالزر (تأكد أن الـ ID في HTML هو deleteBtn)
document.getElementById("deleteBtn").addEventListener("click", deleteLastMessage);



document.getElementById("upload").addEventListener("change", generateControls);

function generateControls() {
  const files = document.getElementById("upload").files;
  const container = document.getElementById("advancedSettings");
  container.innerHTML = "";

  for (let i = 0; i < files.length; i++) {
    const div = document.createElement("div");
    div.style.border = "1px solid #ccc";
    div.style.padding = "10px";
    div.style.margin = "10px 0";

    div.innerHTML = `
  <p>الصورة ${i + 1}</p>

  <div class="editor-row">

    <canvas id="preview_${i}" width="300" height="200" class="preview-canvas"></canvas>

    <div class="controls">
      <label>تكبير</label>
      <input type="range" min="0.5" max="2" step="0.01" value="1" id="scale_${i}">

      <label>تحريك أفقي</label>
      <input type="range" min="-300" max="300" value="0" id="x_${i}">

      <label>تحريك عمودي</label>
      <input type="range" min="-300" max="300" value="0" id="y_${i}">
    </div>

  </div>
`;

    container.appendChild(div);

    setupPreview(i, files[i]);
  }
}
async function setupPreview(index, file) {
  const baseSrc = await readFileAsDataURL(file);
  const baseImage = await loadImage(baseSrc);
  const overlay = await loadImage(overlaySrc);

  const canvas = document.getElementById(`preview_${index}`);
  const ctx = canvas.getContext("2d");

  function updatePreview() {
    const scale = parseFloat(document.getElementById(`scale_${index}`).value);
    const offsetX = parseInt(document.getElementById(`x_${index}`).value);
    const offsetY = parseInt(document.getElementById(`y_${index}`).value);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const newWidth = canvas.width * scale;
    const newHeight = canvas.height * scale;

    const centerX = (canvas.width - newWidth) / 2 + offsetX;
    const centerY = (canvas.height - newHeight) / 2 + offsetY;

    ctx.drawImage(baseImage, centerX, centerY, newWidth, newHeight);
    ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);
  }

  // أول رسم
  updatePreview();

  // ربط السلايدر بالتحديث
  document.getElementById(`scale_${index}`).addEventListener("input", updatePreview);
  document.getElementById(`x_${index}`).addEventListener("input", updatePreview);
  document.getElementById(`y_${index}`).addEventListener("input", updatePreview);
}

function refreshDeleteButtons() {
    const container = document.getElementById("downloads");
    
    // حذف الأزرار من الواجهة فقط
    container.innerHTML = "";

    // (اختياري) إذا تبغى تمسح الذاكرة أيضًا:
    localStorage.removeItem("msg_ids");
    messageIds = [];

    alert("تم مسح أزرار الحذف");
}
</script>
